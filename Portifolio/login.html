<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Protegido</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --bg: #0b0f1a;
            --card-bg: #161b2c;
            --text: #ffffff;
            --input-bg: #1f2937;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* TELA DE LOGIN */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 300px;
        }

        /* PAINEL (ESCONDIDO POR PADRÃO) */
        #main-content {
            display: none;
            padding: 20px;
        }

        /* Estilos do Formulário e Cards (Mantidos do anterior) */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
        }

        .admin-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            background: var(--input-bg);
            border: 1px solid #374151;
            color: white;
            border-radius: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2d3748;
            margin-bottom: 20px;
        }

        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #2d3748;
        }

        .card-body {
            padding: 15px;
        }

        .tag-tech {
            display: inline-block;
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin: 5px 5px 0 0;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .type-badge {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--secondary);
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .preview-box {
            border: 2px dashed #4b5563;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 850px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- TELA DE LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Acesso Restrito</h2>
            <p style="color: #9ca3af; font-size: 0.9rem;">Digite a senha para gerenciar</p>
            <input type="password" id="password-input" placeholder="Senha">
            <button onclick="checkLogin()">Entrar</button>
            <p id="login-error" style="color: #ef4444; font-size: 0.8rem; margin-top: 10px; display: none;">Senha
                incorreta!</p>
        </div>
    </div>

    <!-- CONTEÚDO DO PAINEL -->
    <div id="main-content" class="container">
        <header
            style="text-align: center; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;">
            <h1>Dashboard Portfólio</h1>
            <button onclick="logout()" style="width: auto; padding: 8px 15px; background: #374151;">Sair</button>
        </header>

        <div class="main-grid">
            <div class="admin-panel">
                <h2>Novo Item</h2>
                <label>Tipo</label>
                <select id="tipo" onchange="update()">
                    <option value="Projeto">Projeto</option>
                    <option value="Diploma">Diploma</option>
                </select>
                <input type="text" id="titulo" placeholder="Título" oninput="update()">
                <input type="text" id="techs" placeholder="Tecnologias (ex: React, Node)" oninput="update()">
                <input type="text" id="img" placeholder="URL da Imagem" oninput="update()">
                <textarea id="desc" rows="3" placeholder="Descrição" oninput="update()"></textarea>
                <button onclick="salvar()">Publicar</button>
            </div>

            <div class="display-section">
                <div class="preview-box">
                    <h3 style="margin:0 0 10px 0; font-size: 0.8rem; color: #6b7280;">Preview</h3>
                    <div id="preview-render"></div>
                </div>
                <h2>Itens Publicados</h2>
                <div class="portfolio-grid" id="lista-portfolio"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DE LOGIN
        const SENHA_CORRETA = "1234"; // Mude sua senha aqui!

        function checkLogin() {
            const input = document.getElementById('password-input').value;
            if (input === SENHA_CORRETA) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                sessionStorage.setItem('logado', 'true');
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            sessionStorage.removeItem('logado');
            window.location.reload();
        }

        // Verifica se já estava logado nesta sessão
        if (sessionStorage.getItem('logado') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        // LÓGICA DO PORTFÓLIO (MESMA ANTERIOR)
        function gerarTags(texto) {
            if (!texto) return '';
            return texto.split(',').map(t => `<span class="tag-tech">${t.trim()}</span>`).join('');
        }

        function update() {
            const titulo = document.getElementById('titulo').value || "Título Exemplo";
            const tipo = document.getElementById('tipo').value;
            const techs = document.getElementById('techs').value;
            const img = document.getElementById('img').value || "https://placeholder.com";
            const desc = document.getElementById('desc').value || "Descrição...";

            document.getElementById('preview-render').innerHTML = `
                <div class="card">
                    <img src="${img}" class="card-img">
                    <div class="card-body">
                        <span class="type-badge">${tipo}</span>
                        <h3 style="margin: 5px 0;">${titulo}</h3>
                        <p style="font-size: 0.85rem; color: #9ca3af; margin-bottom: 10px;">${desc}</p>
                        <div>${gerarTags(techs)}</div>
                    </div>
                </div>
            `;
        }

        function salvar() {
            const titulo = document.getElementById('titulo').value;
            if (!titulo) return alert("Título obrigatório!");
            const card = document.getElementById('preview-render').innerHTML;
            const div = document.createElement('div');
            div.innerHTML = card;
            document.getElementById('lista-portfolio').prepend(div);

            // Limpa campos
            ['titulo', 'techs', 'img', 'desc'].forEach(id => document.getElementById(id).value = "");
            update();
        }

        update();
    </script>
</body>

</html>
