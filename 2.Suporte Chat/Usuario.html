<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte Profissional Desktop</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg-body: #f8fafc;
            --bg-chat: #ffffff;
            --text-main: #1e293b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Layout Desktop Responsivo */
        .app-container {
            width: 100%;
            max-width: 1000px; /* Largura de desktop */
            height: 85vh;
            background: var(--bg-chat);
            display: flex;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        /* Barra Lateral (Menu de Contatos - Estilo Desktop) */
        .sidebar {
            width: 300px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: #f1f5f9;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; } /* Esconde a lateral no celular para focar no chat */
        }

        .sidebar-header { padding: 20px; font-weight: bold; border-bottom: 1px solid var(--border); }

        /* Área Principal do Chat */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        /* Cabeçalho do Chat */
        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; }

        /* Área de Mensagens */
        .messages-container {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg-row { display: flex; width: 100%; }
        .msg-row.sent { justify-content: flex-end; }

        .bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        .received .bubble {
            background: #f1f5f9;
            color: var(--text-main);
            border-bottom-left-radius: 0;
        }

        .sent .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0;
        }

        /* Indicador "Digitando" Profissional */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #64748b;
            margin-top: -10px;
        }

        .dot { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Campo de Digitação (Footer) */
        .chat-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: white;
        }

        .input-group {
            display: flex;
            gap: 10px;
            background: #f8fafc;
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .input-group:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            padding: 8px 0;
        }

        .btn-send {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-send:hover { opacity: 0.9; }

    </style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar - Só aparece no Desktop -->
    <div class="sidebar">
        <div class="sidebar-header">Conversas</div>
        <div style="padding: 20px; color: #64748b; font-size: 14px;">
            <div style="background: #fff; padding: 10px; border-radius: 8px; border: 1px solid var(--border);">
                <strong>#10293 - Suporte</strong><br>
                <small>Última interação: Agora</small>
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="main-chat">
        <header class="chat-header">
            <div class="user-info">
                <div class="status-dot"></div>
                <div>
                    <h4 style="font-size: 15px;">Atendente: Bruno Silva</h4>
                    <p style="font-size: 12px; color: #64748b;">Protocolo: 20249910</p>
                </div>
            </div>
            <button style="background: none; border: 1px solid #e2e8f0; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">Fechar Ticket</button>
        </header>

        <main class="messages-container">
            <!-- Mensagem Recebida -->
            <div class="msg-row received">
                <div class="bubble">
                    Olá! Bem-vindo ao suporte premium. Analisamos seu caso e o técnico já está ciente.
                </div>
            </div>

            <!-- Mensagem Enviada -->
            <div class="msg-row sent">
                <div class="bubble">
                    Perfeito! Sabe me dizer quanto tempo leva para a ativação do serviço?
                </div>
            </div>

            <!-- Digitando -->
            <div class="typing-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <span>Bruno está consultando o sistema...</span>
            </div>
        </main>

        <footer class="chat-footer">
            <div class="input-group">
                <input type="text" placeholder="Escreva sua resposta aqui...">
                <button class="btn-send">Enviar</button>
            </div>
        </footer>
    </div>
</div>

</body>
</html>
