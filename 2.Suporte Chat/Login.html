<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema de Suporte</title>
    <style>
        :root {
            --primary: #3b82f6;
            --dark: #1e293b;
            --bg: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Botões de Alternância (Para você testar as duas telas) */
        .toggle-container {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .toggle-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .toggle-btn.active { background: white; color: var(--dark); }

        /* Card Principal */
        .auth-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 { color: var(--dark); margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 30px; font-size: 14px; }

        /* Formulários */
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 5px; }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: 0.2s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { background: #2563eb; transform: translateY(-1px); }

        /* Estilo específico para Atendente (Cor Escura) */
        .admin-theme .btn-submit { background: var(--dark); }
        .admin-theme h2 { color: #1e293b; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="toggle-container">
        <button id="btnUser" class="toggle-btn active" onclick="showForm('user')">Sou Cliente</button>
        <button id="btnAdmin" class="toggle-btn" onclick="showForm('admin')">Sou Atendente</button>
    </div>

    <!-- FORMULÁRIO DO USUÁRIO (CADASTRO) -->
    <div id="formUser" class="auth-card">
        <h2>Criar Conta</h2>
        <p>Preencha os dados para iniciar um chat de suporte.</p>
        
        <div class="input-group">
            <label>Nome Completo</label>
            <input type="text" placeholder="Ex: João Silva">
        </div>

        <div class="input-group">
            <label>Seu Melhor E-mail</label>
            <input type="email" placeholder="joao@exemplo.com">
        </div>

        <div class="input-group">
            <label>Defina uma Senha</label>
            <input type="password" placeholder="••••••••">
        </div>

        <button class="btn-submit">Cadastrar e Entrar</button>
        <div style="margin-top: 15px; font-size: 13px;">
            Já tem conta? <a href="#" style="color: var(--primary); text-decoration: none;">Fazer Login</a>
        </div>
    </div>

    <!-- FORMULÁRIO DO ATENDENTE (LOGIN) -->
    <div id="formAdmin" class="auth-card admin-theme hidden">
        <div style="background: #f1f5f9; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            👤
        </div>
        <h2>Painel Interno</h2>
        <p>Acesso restrito para equipe de suporte.</p>
        
        <div class="input-group">
            <label>ID do Colaborador</label>
            <input type="text" placeholder="Digite seu ID">
        </div>

        <div class="input-group">
            <label>Senha de Acesso</label>
            <input type="password" placeholder="••••••••">
        </div>

        <button class="btn-submit">Acessar Console</button>
        <div style="margin-top: 15px; font-size: 13px;">
            Esqueceu a senha? <a href="#" style="color: var(--dark); text-decoration: none;">Recuperar acesso</a>
        </div>
    </div>

    <script>
        function showForm(type) {
            const formUser = document.getElementById('formUser');
            const formAdmin = document.getElementById('formAdmin');
            const btnUser = document.getElementById('btnUser');
            const btnAdmin = document.getElementById('btnAdmin');

            if(type === 'user') {
                formUser.classList.remove('hidden');
                formAdmin.classList.add('hidden');
                btnUser.classList.add('active');
                btnAdmin.classList.remove('active');
            } else {
                formAdmin.classList.remove('hidden');
                formUser.classList.add('hidden');
                btnAdmin.classList.add('active');
                btnUser.classList.remove('active');
            }
        }
    </script>

</body>
</html>
